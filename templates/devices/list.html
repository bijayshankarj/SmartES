{% extends 'base.html' %}

{% block content %}

<h1>Devices</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Type</th>
    <th>OS</th>
    <th>Battery</th>
    <th>Status</th>
</tr>

{% for device in devices %}

<tr>
    <td>{{ device.device_name }}</td>
    <td>{{ device.device_type }}</td>
    <td>{{ device.operating_system }}</td>
    <td>{{ device.battery_level }}%</td>
    <td>{{ device.status }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
